name: Backend Index Governance

on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - main
            - release/**

permissions:
    contents: read

jobs:
    card-index-drift:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        defaults:
            run:
                working-directory: backend
                shell: bash

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Versions
              run: |
                  set -euo pipefail
                  node -v
                  npm -v

            - name: Install (backend)
              run: npm ci

            - name: Sanity - imports (no secrets)
              run: npm run sanity:imports

            # PR policy: warning-only (does not fail the workflow)
            - name: Sanity (PR warning) - card index drift
              if: github.event_name == 'pull_request'
              continue-on-error: true
              env:
                  MONGO_URI_DRIFT_CHECK: ${{ secrets.MONGO_URI_DRIFT_CHECK }}
              run: |
                  set -euo pipefail

                  if [ -z "${MONGO_URI_DRIFT_CHECK:-}" ]; then
                    echo "WARN: MONGO_URI_DRIFT_CHECK secret is missing; skipping sanity:card-index-drift on PR. No fallback to production."
                    exit 0
                  fi

                  export MONGO_URI="$MONGO_URI_DRIFT_CHECK"
                  npm run sanity:card-index-drift

            # main/release policy: fail the workflow on drift
            - name: Sanity (main/release gate) - card index drift
              if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
              env:
                  MONGO_URI_DRIFT_CHECK: ${{ secrets.MONGO_URI_DRIFT_CHECK }}
              run: |
                  set -euo pipefail

                  if [ -z "${MONGO_URI_DRIFT_CHECK:-}" ]; then
                    echo "ERROR: MONGO_URI_DRIFT_CHECK secret is missing; cannot run drift gate. No fallback to production."
                    exit 1
                  fi

                  export MONGO_URI="$MONGO_URI_DRIFT_CHECK"
                  npm run sanity:card-index-drift
